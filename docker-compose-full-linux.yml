services:
  ollama:
    image: ollama/ollama:latest
    container_name: ogham-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ogham-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_EMBED_MODEL:-embeddinggemma}"]
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: ogham-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ogham}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ogham}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema_postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ogham} -d ${POSTGRES_DB:-ogham}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ogham:
    build: .
    image: ogham-mcp:latest
    container_name: ogham-mcp
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
      DATABASE_BACKEND: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-ogham}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ogham}
      # Override stdio default for SSE mode (multi-client); remove to keep stdio
      OGHAM_TRANSPORT: sse
      OGHAM_HOST: 0.0.0.0
      OGHAM_PORT: "8742"
    ports:
      - "8742:8742"
    command: serve
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
